<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kumbukum</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <!-- Warning view: shown when not configured -->
  <div id="view-warning" class="view" style="display:none;">
    <div class="warning-container">
      <div class="logo-small">K</div>
      <p id="warning-message">Please configure your Kumbukum settings.</p>
      <button id="btn-open-settings" class="btn btn-primary btn-full">Open Settings</button>
    </div>
  </div>

  <!-- Main view -->
  <div id="view-main" class="view" style="display:none;">
    <!-- Account switcher -->
    <div class="section section-account">
      <select id="account-switcher" class="account-select">
        <option value="">No accounts</option>
      </select>
    </div>

    <!-- Current page URL display + Save URL Only -->
    <div class="section section-url">
      <div class="input-group">
        <input type="text" id="current-url" class="input input-group-field current-url-input" title="" readonly>
        <button id="btn-save-url-only" class="btn btn-outline btn-input-group">Save URL</button>
      </div>
      <div id="url-status" class="status" style="display:none;"></div>
    </div>

    <div class="section section-email" id="email-section" style="display:none;">
      <div class="section-title">Email detected</div>
      <div id="email-preview" style="display:none;">
        <div class="input-group">
          <input type="text" id="email-preview-subject" class="input input-group-field email-subject-input" placeholder="Email subject">
          <button id="btn-save-email" class="btn btn-outline btn-input-group" style="display:none;">Add Email</button>
        </div>
      </div>
      <div class="email-empty-state" id="email-empty-state" style="display:none;"></div>
      <button id="btn-email-settings" class="btn btn-secondary btn-full email-secondary-action" style="display:none;">Connector Settings</button>
      <div id="email-status" class="status" style="display:none;"></div>
    </div>

    <hr class="divider">

    <!-- Note section -->
    <div class="section section-note">
      <input type="text" id="note-title" class="input" placeholder="Note title (optional)">
      <textarea id="note-editor"></textarea>
      <div class="btn-row">
        <button id="btn-save-note-only" class="btn btn-secondary btn-half">Save Note Only</button>
        <button id="btn-save-url-note" class="btn btn-primary btn-half">Save URL &amp; Note</button>
      </div>
      <div id="note-status" class="status" style="display:none;"></div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
